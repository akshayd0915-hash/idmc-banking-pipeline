<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 860" font-family="Segoe UI,Arial,sans-serif">

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <style>
    .th { font-size:14px; font-weight:600; }
    .ts { font-size:12px; }
    .c-gray  { fill:#e8eaed; stroke:#9aa0a6; stroke-width:1.5; }
    .c-purple{ fill:#e8d5f5; stroke:#7c4dff; stroke-width:1.5; }
    .c-blue  { fill:#d3e3fd; stroke:#4285f4; stroke-width:1.5; }
    .c-coral { fill:#fce8e6; stroke:#ea4335; stroke-width:1.5; }
    .c-red   { fill:#ffdad6; stroke:#c62828; stroke-width:1.5; }
    .c-teal  { fill:#d2f4ea; stroke:#1e7e5e; stroke-width:1.5; }
    .arr     { fill:none; stroke:#555; stroke-width:1.5; marker-end:url(#arrow); }
    .arr-red { fill:none; stroke:#c62828; stroke-width:1.5; stroke-dasharray:5,3; marker-end:url(#arrow); }
  </style>

  <!-- Title -->
  <text x="450" y="22" class="th" text-anchor="middle" dominant-baseline="central">IDMC Banking Data Pipeline — Architecture</text>
  <text x="450" y="42" class="ts" text-anchor="middle" dominant-baseline="central" fill="#555">Informatica CDI + CDQ + CDGC | Snowflake storage-only target</text>

  <!-- Vertical divider -->
  <line x1="88" y1="55" x2="88" y2="840" stroke="#ccc" stroke-width="1"/>

  <!-- Layer labels -->
  <text x="52" y="102" class="ts" text-anchor="middle" dominant-baseline="central">Sources</text>
  <text x="52" y="200" class="ts" text-anchor="middle" dominant-baseline="central">CDI ingest</text>
  <text x="52" y="292" class="ts" text-anchor="middle" dominant-baseline="central">Raw layer</text>
  <text x="52" y="378" class="ts" text-anchor="middle" dominant-baseline="central">CDQ quality</text>
  <text x="52" y="470" class="ts" text-anchor="middle" dominant-baseline="central">CDI curated</text>
  <text x="52" y="578" class="ts" text-anchor="middle" dominant-baseline="central">Curated</text>
  <text x="52" y="688" class="ts" text-anchor="middle" dominant-baseline="central">CDGC</text>
  <text x="52" y="788" class="ts" text-anchor="middle" dominant-baseline="central">Target</text>

  <!-- ── Row 1: Sources ── -->
  <rect x="110" y="72" width="234" height="60" rx="6" class="c-gray"/>
  <text x="227" y="95"  class="th" text-anchor="middle" dominant-baseline="central">Flat files (CSV)</text>
  <text x="227" y="115" class="ts" text-anchor="middle" dominant-baseline="central" fill="#555">Daily batch · on-prem</text>

  <rect x="363" y="72" width="234" height="60" rx="6" class="c-gray"/>
  <text x="480" y="95"  class="th" text-anchor="middle" dominant-baseline="central">Core banking API</text>
  <text x="480" y="115" class="ts" text-anchor="middle" dominant-baseline="central" fill="#555">FIS / REST endpoints</text>

  <rect x="616" y="72" width="234" height="60" rx="6" class="c-gray"/>
  <text x="733" y="95"  class="th" text-anchor="middle" dominant-baseline="central">Oracle DB (CDC)</text>
  <text x="733" y="115" class="ts" text-anchor="middle" dominant-baseline="central" fill="#555">Redo log capture</text>

  <!-- ── Row 2: CDI Ingest ── -->
  <rect x="110" y="170" width="760" height="60" rx="6" class="c-purple"/>
  <text x="490" y="193" class="th" text-anchor="middle" dominant-baseline="central">Informatica CDI — Ingestion taskflow</text>
  <text x="490" y="213" class="ts" text-anchor="middle" dominant-baseline="central" fill="#555">Parameterized mappings · watermark incremental · CDC detect · parallel ingest group</text>

  <!-- ── Row 3: Raw layer ── -->
  <rect x="110" y="262" width="760" height="60" rx="6" class="c-blue"/>
  <text x="490" y="285" class="th" text-anchor="middle" dominant-baseline="central">BANKING_DW.RAW — Bronze · append-only · immutable</text>
  <text x="490" y="305" class="ts" text-anchor="middle" dominant-baseline="central" fill="#555">RAW.CUSTOMERS · RAW.ACCOUNTS · RAW.TRANSACTIONS · RAW.ACCOUNT_BALANCES</text>

  <!-- ── Row 4: CDQ Quality ── -->
  <rect x="110" y="348" width="600" height="60" rx="6" class="c-coral"/>
  <text x="410" y="371" class="th" text-anchor="middle" dominant-baseline="central">Informatica CDQ — Data quality (35+ rules)</text>
  <text x="410" y="391" class="ts" text-anchor="middle" dominant-baseline="central" fill="#555">Null checks · email pattern · domain constraints · balance arithmetic · reject routing</text>

  <rect x="724" y="348" width="146" height="60" rx="6" class="c-red"/>
  <text x="797" y="371" class="th" text-anchor="middle" dominant-baseline="central">Reject table</text>
  <text x="797" y="391" class="ts" text-anchor="middle" dominant-baseline="central" fill="#555">ERROR.REJECT_RECORDS</text>

  <!-- Red dashed arrow: coral → reject box -->
  <line x1="710" y1="378" x2="722" y2="378" class="arr-red"/>

  <!-- ── Row 5: CDI Curated ── -->
  <rect x="110" y="440" width="760" height="60" rx="6" class="c-purple"/>
  <text x="490" y="463" class="th" text-anchor="middle" dominant-baseline="central">Informatica CDI — Curated load (sequential)</text>
  <text x="490" y="483" class="ts" text-anchor="middle" dominant-baseline="central" fill="#555">SCD Type 2 (customer) · Type 1 (account) · SK via Joiner · dedup lookups · balance snapshot</text>

  <!-- ── Row 6: Curated tables ── -->
  <rect x="110" y="548" width="176" height="60" rx="6" class="c-blue"/>
  <text x="198" y="571" class="th" text-anchor="middle" dominant-baseline="central">DIM_CUSTOMER</text>
  <text x="198" y="591" class="ts" text-anchor="middle" dominant-baseline="central" fill="#555">SCD Type 2 · EFF dates</text>

  <rect x="302" y="548" width="176" height="60" rx="6" class="c-blue"/>
  <text x="390" y="571" class="th" text-anchor="middle" dominant-baseline="central">DIM_ACCOUNT</text>
  <text x="390" y="591" class="ts" text-anchor="middle" dominant-baseline="central" fill="#555">Type 1 · upsert</text>

  <rect x="494" y="548" width="176" height="60" rx="6" class="c-blue"/>
  <text x="582" y="571" class="th" text-anchor="middle" dominant-baseline="central">FACT_TRANSACTIONS</text>
  <text x="582" y="591" class="ts" text-anchor="middle" dominant-baseline="central" fill="#555">Dedup · SK in CDI</text>

  <rect x="686" y="548" width="176" height="60" rx="6" class="c-blue"/>
  <text x="774" y="571" class="th" text-anchor="middle" dominant-baseline="central">FACT_BALANCES</text>
  <text x="774" y="591" class="ts" text-anchor="middle" dominant-baseline="central" fill="#555">Daily snapshot</text>

  <!-- ── Row 7: CDGC ── -->
  <rect x="110" y="658" width="760" height="60" rx="6" class="c-teal"/>
  <text x="490" y="681" class="th" text-anchor="middle" dominant-baseline="central">Informatica CDGC — Governance &amp; catalog</text>
  <text x="490" y="701" class="ts" text-anchor="middle" dominant-baseline="central" fill="#555">Data domains · business glossary · auto-lineage · PII masking · profiling</text>

  <!-- ── Row 8: Target ── -->
  <rect x="110" y="758" width="370" height="60" rx="6" class="c-teal"/>
  <text x="295" y="781" class="th" text-anchor="middle" dominant-baseline="central">CUSTOMER_360_SUMMARY</text>
  <text x="295" y="801" class="ts" text-anchor="middle" dominant-baseline="central" fill="#555">Value tier · balance · activity · tenure</text>

  <rect x="500" y="758" width="370" height="60" rx="6" class="c-gray"/>
  <text x="685" y="781" class="th" text-anchor="middle" dominant-baseline="central">CONTROL layer</text>
  <text x="685" y="801" class="ts" text-anchor="middle" dominant-baseline="central" fill="#555">Pipeline watermarks · run log</text>

  <!-- ── Arrows ── -->

  <!-- 3 source boxes → CDI Ingest -->
  <line x1="227" y1="132" x2="227" y2="168" class="arr"/>
  <line x1="480" y1="132" x2="480" y2="168" class="arr"/>
  <line x1="733" y1="132" x2="733" y2="168" class="arr"/>

  <!-- CDI Ingest → Raw layer -->
  <line x1="490" y1="230" x2="490" y2="260" class="arr"/>

  <!-- Raw layer → CDQ Quality -->
  <line x1="490" y1="322" x2="490" y2="346" class="arr"/>

  <!-- CDQ Quality (coral) → CDI Curated -->
  <line x1="410" y1="408" x2="410" y2="438" class="arr"/>

  <!-- CDI Curated → 4 curated boxes (fan out) -->
  <line x1="198" y1="500" x2="198" y2="546" class="arr"/>
  <line x1="390" y1="500" x2="390" y2="546" class="arr"/>
  <line x1="582" y1="500" x2="582" y2="546" class="arr"/>
  <line x1="774" y1="500" x2="774" y2="546" class="arr"/>

  <!-- 4 curated boxes → CDGC (fan in) -->
  <line x1="198" y1="608" x2="198" y2="656" class="arr"/>
  <line x1="390" y1="608" x2="390" y2="656" class="arr"/>
  <line x1="582" y1="608" x2="582" y2="656" class="arr"/>
  <line x1="774" y1="608" x2="774" y2="656" class="arr"/>

  <!-- CDGC → 2 target boxes -->
  <line x1="295" y1="718" x2="295" y2="756" class="arr"/>
  <line x1="685" y1="718" x2="685" y2="756" class="arr"/>

</svg>
